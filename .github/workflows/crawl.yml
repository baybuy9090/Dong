name: 브랜드 입점 크롤링 (매일)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 크롤러 실행
        run: node crawler.js

      - name: 결과 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json history/
          git diff --staged --quiet || git commit -m "자동 크롤링 결과 업데이트 $(date +'%Y-%m-%d')"
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push 실패, 원격 변경사항 반영 후 재시도 ($i)"
            git pull --rebase origin main
            sleep 5
          done
          git push
